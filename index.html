<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .question-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            margin: 0;
        }

        .option input[type="radio"]:checked + label {
            color: #667eea;
            font-weight: 600;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }

        .btn-prev:hover {
            background: #d0d0d0;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-next:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .btn-next:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Result Styles */
        .result-container {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-type {
            font-size: 3em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .result-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .result-description {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            color: #333;
            line-height: 1.6;
        }

        .traits {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .trait {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .trait-label {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }

        .trait-value {
            color: #333;
            font-size: 1.1em;
            margin-top: 5px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            font-size: 1.1em;
            margin-top: 30px;
        }

        .btn-restart:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.5em;
            }

            .result-type {
                font-size: 2.5em;
            }

            .traits {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-prev {
                width: 100%;
            }
        }
    </style>
</head>

        // State Management
        let currentQuestion = 0;
        let answers = {
            "E/I": { E: 0, I: 0 },
            "S/N": { S: 0, N: 0 },
            "T/F": { T: 0, F: 0 },
            "J/P": { J: 0, P: 0 }
        };

        function initializeTest() {
            renderQuestion();
        }

        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById("questionContainer");

            let optionsHTML = question.options.map((option, index) => `
                <div class="option" onclick="selectOption(this, '${option.value}')">
                    <input type="radio" id="option${index}" name="answer" value="${option.value}">
                    <label for="option${index}">${option.text}</label>
                </div>
            `).join("");

            container.innerHTML = `
                <div class="question-number">问题 ${currentQuestion + 1} / ${questions.length}</div>
                <div class="question-text">${question.text}</div>
                <div class="options">${optionsHTML}</div>
            `;

            updateProgressBar();
            updateButtons();
        }

        function selectOption(element, value) {
            const parent = element.parentElement;
            parent.querySelectorAll(".option").forEach(opt => opt.classList.remove("selected"));
            element.classList.add("selected");
            element.querySelector("input").checked = true;
        }

        function nextQuestion() {
            const selected = document.querySelector("input[name='answer']:checked");
            if (!selected) {
                alert("请先选择一个答案");
                return;
            }

            const question = questions[currentQuestion];
            const value = selected.value;
            answers[question.dimension][value]++;

            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                const question = questions[currentQuestion - 1];
                const selectedValue = document.querySelector("input[name='answer']:checked")?.value;
                if (selectedValue) {
                    answers[question.dimension][selectedValue]--;
                }
                currentQuestion--;
                renderQuestion();
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById("progressFill").style.width = progress + "%";
        }

        function updateButtons() {
            document.getElementById("prevBtn").style.display = currentQuestion === 0 ? "none" : "block";
            document.getElementById("nextBtn").textContent = currentQuestion === questions.length - 1 ? "完成 ✓" : "下一题 →";
        }

        function showResults() {
            const result = calculateResult();
            const personality = personalityTypes[result];

            const container = document.getElementById("resultContainer");
            const traitsHTML = Object.entries(personality.traits)
                .map(([key, value]) => `<div class="trait"><div class="trait-label">${key}</div><div class="trait-value">${value}</div></div>`)
                .join("");

            container.innerHTML = `
                <div style="font-size: 4em; margin-bottom: 10px;">${personality.emoji}</div>
                <div class="result-type">${result}</div>
                <div class="result-name">${personality.name}</div>
                <div class="result-description">${personality.description}</div>
                <div class="traits">${traitsHTML}</div>
                <button class="btn-restart" onclick="restartTest()">重新开始测试</button>
            `;

            document.getElementById("testContainer").classList.add("hidden");
            document.getElementById("resultContainer").classList.remove("hidden");
        }

        function calculateResult() {
            let result = "";
            result += answers["E/I"]["E"] >= answers["E/I"]["I"] ? "E" : "I";
            result += answers["S/N"]["S"] >= answers["S/N"]["N"] ? "S" : "N";
            result += answers["T/F"]["T"] >= answers["T/F"]["F"] ? "T" : "F";
            result += answers["J/P"]["J"] >= answers["J/P"]["P"] ? "J" : "P";
            return result;
        }

        function restartTest() {
            currentQuestion = 0;
            answers = {
                "E/I": { E: 0, I: 0 },
                "S/N": { S: 0, N: 0 },
                "T/F": { T: 0, F: 0 },
                "J/P": { J: 0, P: 0 }
            };
            document.getElementById("testContainer").classList.remove("hidden");
            document.getElementById("resultContainer").classList.add("hidden");
            initializeTest();
        }

        // Initialize on page load
        window.addEventListener("DOMContentLoaded", initializeTest);
    </script>
</body>
</html>
